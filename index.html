<script>
async function fetchBtcPrice() {
    const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=thb');
    const data = await response.json();
    document.getElementById('displayBtcPrice').innerText = data.bitcoin.thb + ' THB';
    document.getElementById('cfgBtcPrice').value = data.bitcoin.thb;
}

async function fetchGoldPrice() {
    const response = await fetch('https://api.goldprice.org/api/calculateGoldPrice?currency=THB');
    const data = await response.json();
    document.getElementById('displayGoldPrice').innerText = data.price + ' THB';
    document.getElementById('cfgNisabGold').value = data.price;
}

async function fetchSilverPrice() {
    const response = await fetch('https://api.silverprice.org/api/calculateSilverPrice?currency=THB');
    const data = await response.json();
    document.getElementById('cfgNisabSilver').value = data.price;
}

async function fetchAllPricesWithRetry() {
    try {
        await Promise.all([fetchBtcPrice(), fetchGoldPrice(), fetchSilverPrice()]);
    } catch (error) {
        console.error('Error fetching prices:', error);
        // Optionally implement a retry mechanism here
    }
}

// Set timezone to Thailand
const options = { timeZone: 'Asia/Bangkok' };
setInterval(fetchAllPricesWithRetry, 600000); // update every 10 minutes
fetchAllPricesWithRetry(); // initial call
</script>
